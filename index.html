<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <title>Document</title>
<style>
    body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
            flex-direction: column;
        }

        /* الزرار */
        .btn {
            padding: 15px 25px;
            font-size: 18px;
            background: #00c896;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
        }

        /* لما يتضغط */
        .btn.active {
            transform: rotate(180deg);
            background: #ff5e5e;
        }

        /* الانيميشن */
        .box {
            width: 100px;
            height: 100px;
            border: 5px solid #00c896;
            border-top: 5px solid transparent;
            border-radius: 50%;
            margin-top: 20px;
            display: none;
        }

        /* لما يظهر */
        .box.show {
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
</style>
</head>
<body>
   tton class="btn" onclick="toggleAnim()" </button>

    <div class="box" id="animBox"></div>

    <script>
        function toggleAnim() {
            let btn = document.querySelector(".btn");
            let box = document.getElementById("animBox");

            btn.classList.toggle("active");
            box.classList.toggle("show");
        }
    </script>
</body>
</html>
